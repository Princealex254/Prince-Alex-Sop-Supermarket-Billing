<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailFlow Admin — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Firebase v9 Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --brand:  #2563eb;
            --accent: #7c3aed;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
        }

        /* ── Sidebar ─────────────────────────────────────────── */
        .sidebar {
            width: 260px; min-width: 260px;
            background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh;
        }
        .nav-link {
            display: flex; align-items: center; gap: .75rem;
            padding: .85rem 1.25rem;
            color: rgba(255,255,255,.55);
            font-size: .875rem; font-weight: 500;
            border-left: 3px solid transparent;
            transition: all .2s; cursor: pointer;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,.07); }
        .nav-link.active {
            color: #fff;
            border-left-color: var(--brand);
            background: rgba(37,99,235,.18);
        }

        /* ── Cards ───────────────────────────────────────────── */
        .metric-card {
            background: #fff; border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
            border: 1px solid #e2e8f0;
        }
        .metric-card .icon-wrap {
            width: 48px; height: 48px;
            border-radius: .85rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── Tables ──────────────────────────────────────────── */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left; font-size: .7rem;
            font-weight: 700; letter-spacing: .06em;
            text-transform: uppercase; color: #64748b;
            padding: .75rem 1rem; background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            position: sticky; top: 0; z-index: 10;
        }
        .data-table td {
            padding: .75rem 1rem;
            font-size: .875rem; color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }
        .data-table tr:hover td { background: #f8fafc; }
        .table-wrap {
            overflow: auto; max-height: 540px;
            border: 1px solid #e2e8f0; border-radius: 1rem;
        }

        /* ── Badges ──────────────────────────────────────────── */
        .badge {
            display: inline-flex; align-items: center;
            padding: .2rem .65rem; border-radius: 999px;
            font-size: .7rem; font-weight: 700;
        }
        .badge-green  { background: #dcfce7; color: #166534; }
        .badge-red    { background: #fee2e2; color: #991b1b; }
        .badge-amber  { background: #fef3c7; color: #92400e; }
        .badge-blue   { background: #dbeafe; color: #1e40af; }
        .badge-purple { background: #ede9fe; color: #6d28d9; }

        /* ── Modal ───────────────────────────────────────────── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #fff; border-radius: 1.5rem;
            width: 95%; max-width: 520px;
            padding: 2rem;
            box-shadow: 0 32px 64px rgba(0,0,0,.2);
            max-height: 90vh; overflow-y: auto;
        }

        /* ── Form ────────────────────────────────────────────── */
        .form-label { display: block; font-size: .8rem; font-weight: 600;
                      color: #475569; margin-bottom: .4rem; }
        .form-input {
            width: 100%; padding: .65rem 1rem;
            border: 2px solid #e2e8f0; border-radius: .75rem;
            font-size: .875rem; color: #1e293b;
            transition: border-color .2s;
            font-family: 'DM Sans', sans-serif;
        }
        .form-input:focus { outline: none; border-color: var(--brand); }
        .form-select {
            width: 100%; padding: .65rem 1rem;
            border: 2px solid #e2e8f0; border-radius: .75rem;
            font-size: .875rem; color: #1e293b; background: #fff;
            font-family: 'DM Sans', sans-serif;
        }
        .form-select:focus { outline: none; border-color: var(--brand); }

        /* ── Buttons ─────────────────────────────────────────── */
        .btn-primary {
            padding: .65rem 1.5rem; background: var(--brand);
            color: #fff; border-radius: .75rem;
            font-weight: 700; font-size: .875rem;
            border: none; cursor: pointer; transition: background .2s;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger {
            padding: .65rem 1.25rem; background: #ef4444;
            color: #fff; border-radius: .75rem;
            font-weight: 700; font-size: .875rem;
            border: none; cursor: pointer; transition: background .2s;
        }
        .btn-danger:hover { background: #dc2626; }
        .btn-ghost {
            padding: .65rem 1.25rem; background: transparent;
            color: #64748b; border-radius: .75rem;
            font-weight: 600; font-size: .875rem;
            border: 2px solid #e2e8f0; cursor: pointer; transition: all .2s;
        }
        .btn-ghost:hover { border-color: #94a3b8; color: #334155; }

        /* ── Toast ───────────────────────────────────────────── */
        #toast-container {
            position: fixed; top: 1rem; right: 1rem;
            z-index: 9999; display: flex; flex-direction: column; gap: .5rem;
        }
        .toast {
            padding: 1rem 1.25rem; border-radius: 1rem; color: #fff;
            font-weight: 500; font-size: .875rem;
            box-shadow: 0 12px 32px rgba(0,0,0,.3);
            opacity: 0; transform: translateX(80px);
            transition: opacity .3s, transform .3s;
            max-width: 360px;
            display: flex; align-items: flex-start; gap: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 1.4;
        }
        .toast-icon { font-size: 1.25rem; flex-shrink: 0; }
        .toast-body { flex: 1; }
        .toast-close {
            background: none; border: none; color: #fff;
            opacity: 0.5; cursor: pointer; font-size: 1.25rem;
            line-height: 1; margin-left: 0.5rem; transition: opacity 0.2s;
        }
        .toast-close:hover { opacity: 1; }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { background: #059669; }
        .toast.error   { background: #dc2626; }
        .toast.info    { background: var(--brand); }
        .toast.warning { background: #d97706; }

        /* ── Login screen ────────────────────────────────────── */
        #loginScreen {
            position: fixed; inset: 0; z-index: 5000;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #312e81 100%);
            display: flex; align-items: center; justify-content: center;
        }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 768px) {
            .sidebar { width: 100%; min-width: 0; min-height: auto; }
            .app-layout { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     JAVASCRIPT
     ════════════════════════════════════════════════════════════ -->
<script>
// ── Firebase init ────────────────────────────────────────────
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAUNs3WYS2mkvPvzRDfhyZFUbP2XpZjDQg",
    authDomain: "retailflow-pos-11726.firebaseapp.com",
    projectId: "retailflow-pos-11726",
    storageBucket: "retailflow-pos-11726.firebasestorage.app",
    messagingSenderId: "309314798354",
    appId: "1:309314798354:web:30784c2b2e7e42168629cb"
};

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

// Secondary app instance to create staff without logging out the admin
const secondaryApp = firebase.initializeApp(FIREBASE_CONFIG, "SecondaryApp");
const secondaryAuth = secondaryApp.auth();
secondaryAuth.setPersistence(firebase.auth.Auth.Persistence.NONE); // Don't persist secondary sessions

db.enablePersistence({ synchronizeTabs: true }).catch(() => {});


// ── State ────────────────────────────────────────────────────
let currentUser  = null;
let currentAdmin = null;  // Firestore user document
let storeData    = null;  // Active store (could be selected by super admin)
let activeSection = 'dashboard';
let listeners    = [];    // Active Firestore listeners

// ── Toast system ─────────────────────────────────────────────
function getFriendlyError(err) {
    let msg = typeof err === 'string' ? err : (err?.message || "An error occurred");
    const code = err?.code || '';
    
    if (code.includes('auth/wrong-password') || msg.includes('auth/wrong-password')) return "Incorrect password. Please try again.";
    if (code.includes('auth/invalid-credential') || msg.includes('auth/invalid-credential')) return "Invalid email or password. Please check your credentials.";
    if (code.includes('auth/user-not-found') || msg.includes('auth/user-not-found')) return "Account not found. Please check the email entered.";
    if (code.includes('auth/too-many-requests') || msg.includes('auth/too-many-requests')) return "Too many failed attempts. Try again in a few minutes.";
    if (code.includes('permission-denied') || msg.includes('permission-denied')) return "Access Denied. You don't have the required permissions.";
    if (msg.includes('failed-precondition') || msg.includes('index')) return "Database index required. Please contact system support.";
    if (msg.includes('offline') || msg.includes('network-request-failed')) return "Connection lost. Please check your internet.";

    return msg;
}

function showToast(msg, type = 'info', duration = 4500) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const el = document.createElement('div');
    el.className = `toast ${type}`;
    
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };

    el.innerHTML = `
        <div class="toast-icon">${icons[type] || '🔔'}</div>
        <div class="toast-body">${getFriendlyError(msg)}</div>
        <button class="toast-close" onclick="this.parentElement.remove()">×</button>
    `;

    container.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));

    if (duration > 0) {
        setTimeout(() => {
            if (el.parentNode) {
                el.classList.remove('show');
                setTimeout(() => el.remove(), 400);
            }
        }, duration);
    }
}

async function initAdminApp(user) {
    const uid = user.uid;
    const email = user.email;
    // Safety: Add your email here to ensure you can always bootstrap/access as Super Admin
    const MASTER_EMAILS = ['senerwaalex@gmail.com', 'noreply@princealex.pro'];

    try {
        let userDoc = await db.collection('users').doc(uid).get();

        /* FIRST SYSTEM USER ONLY */
        if (!userDoc.exists) {
            const allUsersSnap = await db.collection('users').limit(1).get();
            
            // Bootstrap if system is empty OR if current user is in the Master list
            if (allUsersSnap.empty || MASTER_EMAILS.includes(email)) {
                await db.collection('users').doc(uid).set({
                    name: user.displayName || email.split('@')[0],
                    email: email,
                    role: "superadmin",
                    active: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    storeId: null
                });
                showToast("Profile provisioned. You are Super Admin.", "success");
                userDoc = await db.collection('users').doc(uid).get();
            } else {
                showToast("Access denied. No POS profile found for this email.", "error", 6000);
                await auth.signOut();
                return;
            }
        }

        currentAdmin = { id: uid, ...userDoc.data() };

        /* ACTIVE CHECK */
        if (currentAdmin.active !== true) {
            showToast("Your account is deactivated.", "error");
            await auth.signOut();
            return;
        }

        // Normalize role for comparison (handles "Super Admin", "superadmin ", "SuperAdmin", etc.)
        const normalizedRole = (currentAdmin.role || "").toLowerCase().replace(/\s/g, "");
        const managementRoles = ["superadmin", "admin", "manager"];

        /* ROLE AUTHORIZATION */
        if (!managementRoles.includes(normalizedRole)) {
            showToast("Access denied. Management access only.", "warning", 6000);
            await auth.signOut();
            return;
        }

        const isSuperAdmin = normalizedRole === "superadmin";

        /* UPDATE UI */
        document.getElementById('adminName').textContent = currentAdmin.name;
        document.getElementById('adminRole').textContent = currentAdmin.role;
        document.getElementById('adminAvatar').textContent =
            currentAdmin.name.charAt(0).toUpperCase();

        if (isSuperAdmin) {

            document.querySelectorAll('.superadmin-only')
                .forEach(el => el.classList.remove('hidden'));

            document.getElementById('storeSelectorWrap')
                .classList.remove('hidden');

            await loadAllStores();

        } else {

            if (!currentAdmin.storeId) {
                showToast("No store assigned to your account.", "error");
                await auth.signOut();
                return;
            }

            const storeDoc = await db.collection('stores')
                .doc(currentAdmin.storeId).get();

            if (!storeDoc.exists) {
                showToast("Assigned store not found.", "error");
                await auth.signOut();
                return;
            }

            storeData = { id: storeDoc.id, ...storeDoc.data() };

            document.getElementById('sidebarStoreName').textContent =
                storeData.name;
        }

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminApp').classList.remove('hidden');

        navigateTo('dashboard');

    } catch (error) {
        console.error(error);
        showToast(error.message, "error");
    }
}

// ── Super admin: load all stores into selector ───────────────
async function loadAllStores() {
    const snap = await db.collection('stores').orderBy('name').get();
    const stores = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    const sel = document.getElementById('storeSelector');
    sel.innerHTML = stores.map(s =>
        `<option value="${s.id}">${s.name}</option>`
    ).join('');

    if (stores.length > 0) {
        storeData = stores[0];
        document.getElementById('sidebarStoreName').textContent = storeData.name;
    }

    sel.addEventListener('change', async () => {
        const storeDoc = await db.collection('stores').doc(sel.value).get();
        storeData = { id: storeDoc.id, ...storeDoc.data() };
        document.getElementById('sidebarStoreName').textContent = storeData.name;
        navigateTo(activeSection);
    });
}

function navigateTo(section) {
    activeSection = section;

    // Safety check for superadmin only sections
    const isSuperAdmin = (currentAdmin.role || "").toLowerCase().replace(/\s/g, "") === 'superadmin';
    if (section === 'stores' && !isSuperAdmin) {
        showToast("Access Denied: Super Admin permissions required.", "error");
        navigateTo('dashboard');
        return;
    }

    document.querySelectorAll('.nav-link').forEach(l => {
        l.classList.toggle('active', l.dataset.section === section);
    });

    clearListeners();

    const addBtn = document.getElementById('addNewBtn');
    const dateFilter = document.getElementById('dateFilter');
    addBtn.classList.add('hidden');
    dateFilter.classList.add('hidden');

    const sections = {
        dashboard: { title: 'Dashboard', subtitle: 'Real-time overview', fn: renderDashboard },
        products:  { title: 'Products', subtitle: 'Manage product catalogue', fn: renderProducts, add: 'Add Product' },
        users:     { title: 'Staff & Users', subtitle: 'Manage cashiers and managers', fn: renderUsers, add: 'Add Staff' },
        sales:     { title: 'Sales History', subtitle: 'All completed transactions', fn: renderSales, dateFilter: true },
        loyalty:   { title: 'Loyalty Program', subtitle: 'Manage points and customer rewards', fn: renderLoyalty },
        refunds:   { title: 'Refunds', subtitle: 'Manage refund requests', fn: renderRefunds },
        inventory: { title: 'Inventory', subtitle: 'Stock levels and alerts', fn: renderInventory },
        logs:      { title: 'Activity Logs', subtitle: 'Audit trail of system events', fn: renderLogs },
        stores:    { title: 'All Stores', subtitle: 'Super admin view', fn: renderStores, add: 'Add Store' },
        settings:  { title: 'Settings', subtitle: 'Store configuration', fn: renderSettings },
    };

    const cfg = sections[section];
    if (!cfg) return;

    document.getElementById('pageTitle').textContent    = cfg.title;
    document.getElementById('pageSubtitle').textContent = cfg.subtitle;

    if (cfg.add) {
        addBtn.classList.remove('hidden');
        document.getElementById('addNewLabel').textContent = cfg.add;
        addBtn.onclick = () => handleAddNew(section);
    }
    if (cfg.dateFilter) {
        dateFilter.classList.remove('hidden');
        // Default: today
        const today = new Date().toISOString().split('T')[0];
        const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
        document.getElementById('dateFrom').value = weekAgo;
        document.getElementById('dateTo').value   = today;
    }

    cfg.fn();
}

function handleQueryError(err, context) {
    console.error(`Firestore Error [${context}]:`, err);
    if (err.code === 'failed-precondition') {
        showToast(`Index required for ${context}. Check browser console for setup link.`, 'warning', 8000);
    } else {
        showToast(`Failed to load ${context}: ${err.message}`, 'error');
    }
}

window.saveProduct = async (id) => {
    const name     = document.getElementById('mf_name').value.trim();
    const price    = parseFloat(document.getElementById('mf_price').value);
    const offerPrice = parseFloat(document.getElementById('mf_offer_price').value || 0);
    const cost     = parseFloat(document.getElementById('mf_cost').value || 0);
    const stock    = parseInt(document.getElementById('mf_stock').value);
    const barcode  = document.getElementById('mf_barcode').value.trim();
    const category = document.getElementById('mf_category').value.trim();
    const lowAt    = parseInt(document.getElementById('mf_lowstock').value || 10);
    const active   = document.getElementById('mf_active').checked;

    if (!name || isNaN(price) || isNaN(stock)) {
        showToast('Please fill Name, Price and Stock', 'error');
        return;
    }

    const data = { name, price, offerPrice, costPrice: cost, stock, barcode, category, lowStockAt: lowAt,
                   active, storeId: storeData.id, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };

    try {
        if (id) {
            await db.collection('products').doc(id).update(data);
            showToast('Product updated', 'success');
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('products').add(data);
            showToast('Product added', 'success');
        }
        closeModal();
    } catch (err) {

window.saveUser = async (id) => {
    const name = document.getElementById('uf_name').value.trim(); // Ensure name is always present
    const pin  = document.getElementById('uf_pin').value.trim();
    const role = document.getElementById('uf_role').value;

    if (!name || !pin) { showToast('Full Name and PIN are required', 'error'); return; }
    if (!/^\d{4}$/.test(pin)) { showToast('PIN must be exactly 4 digits', 'error'); return; }

    try {
        if (id) {
            // Update existing Firestore profile
            await db.collection('users').doc(id).update({
                name, pin, role, 
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('User updated', 'success');
        } else {
            // Create new Auth account and Firestore profile
            const email = document.getElementById('uf_email').value.trim();
            const password = document.getElementById('uf_password').value;
            
            if (!email || !password) { showToast('Email and Password are required for new staff', 'error'); return; }

            // Create Auth user via secondary app (prevents admin logout)
            const cred = await secondaryAuth.createUserWithEmailAndPassword(email, password);
            const uid = cred.user.uid;

            await db.collection('users').doc(uid).set({
                name, email, pin, role,
                storeId: storeData.id,
                active: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Log out the secondary instance immediately
            await secondaryAuth.signOut();
            showToast('Staff account and profile created successfully', 'success');
        }
        closeModal();
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
    }
};

                </tr></thead>
                <tbody id="salesBody">
                    <tr><td colspan="7" class="text-center py-8 text-slate-400">Apply date filter above</td></tr>
                </tbody>
            </table>
        </div>
    `;

    document.getElementById('applyDateFilter').addEventListener('click', fetchSales);

}

async function fetchSales() {
    if (!storeData) return;
    const from = new Date(document.getElementById('dateFrom').value);
    const to   = new Date(document.getElementById('dateTo').value);
    to.setHours(23, 59, 59, 999);

    const tbody = document.getElementById('salesBody');
    if (!tbody) return;
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-slate-400">Loading…</td></tr>';

    try {
        const snap = await db.collection('sales')
            .where('storeId', '==', storeData.id)
            .where('createdAt', '>=', firebase.firestore.Timestamp.fromDate(from))
            .where('createdAt', '<=', firebase.firestore.Timestamp.fromDate(to))
            .orderBy('createdAt', 'desc')
            .get();

        const sales  = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const total  = sales.reduce((s, sale) => s + (sale.grandTotal||0), 0);
        const avg    = sales.length ? total / sales.length : 0;

        const revenueEl = document.getElementById('salesRevenue');
        const countEl   = document.getElementById('salesCount');
        const avgEl     = document.getElementById('salesAvg');
        if (revenueEl) revenueEl.textContent = fmt(total);
        if (countEl)   countEl.textContent   = sales.length;
        if (avgEl)     avgEl.textContent     = fmt(avg);

        const tbody2 = document.getElementById('salesBody');
        if (!tbody2) return;
        tbody2.innerHTML = sales.length ? sales.map(s => {
            const dt = s.createdAt?.toDate?.() ? new Date(s.createdAt.toDate()).toLocaleString('en-KE') : '—';
            return `<tr>
                <td class="font-mono font-semibold text-blue-600">${s.invoiceNo||'—'}</td>
                <td>${s.items?.length||0}</td>
                <td>${s.cashierName||'—'}</td>
                <td><span class="badge ${s.paymentMethod==='mpesa'?'badge-green':s.paymentMethod==='card'?'badge-blue':'badge-amber'}">${(s.paymentMethod||'').toUpperCase()}</span></td>
                <td class="font-mono text-slate-500">${s.paymentMethod==='cash' ? fmt(s.cashGiven) : '—'}</td>
                <td class="font-mono font-bold">${fmt(s.grandTotal)}</td>
                <td class="text-slate-400 text-xs">${dt}</td>
            </tr>`;
        }).join('') : '<tr><td colspan="7" class="text-center py-8 text-slate-400">No sales in this period</td></tr>';

    } catch (err) {
        showToast('Error loading sales: ' + err.message, 'error');
    }
}

window.approveRefund = async (id) => {
    const batch = db.batch();
    batch.update(db.collection('refunds').doc(id), {
        status: 'approved',
        approvedBy: currentAdmin.id,
        approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });

    // Optionally restore stock here
    const refDoc = await db.collection('refunds').doc(id).get();
    const refData = refDoc.data();
    if (refData.items) {
        refData.items.forEach(item => {
            if (item.productId) {
                batch.update(db.collection('products').doc(item.productId), {
                    stock:     firebase.firestore.FieldValue.increment(item.qty),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                });
            }
        });
    }

    await batch.commit();
    
    await logAdminActivity('refund_approved', `Approved refund for invoice: ${refData.invoiceNo}`);
    
    showToast('Refund approved & stock restored', 'success');
};

window.rejectRefund = async (id) => {
    await db.collection('refunds').doc(id).update({
        status: 'rejected',
        rejectedBy: currentAdmin.id,
        rejectedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    
    await logAdminActivity('refund_rejected', `Rejected refund for ID: ${id}`);
    
    showToast('Refund rejected', 'warning');
};

function renderInventory() {
    if (!storeData) { document.getElementById('contentArea').innerHTML = '<p class="text-slate-500">Loading store data...</p>'; return; }

    document.getElementById('contentArea').innerHTML = `
        <div class="mb-4 flex gap-3 items-center">
            <select id="stockFilter" class="form-select w-48">
                <option value="all">All Products</option>
                <option value="low">Low Stock (≤ 10)</option>
                <option value="out">Out of Stock</option>
                <option value="ok">In Stock</option>
            </select>
        </div>
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr>
                    <th>Product</th><th>Barcode</th><th>Category</th>
                    <th>Stock</th><th>Low Alert At</th><th>Last Updated</th><th>Actions</th>
                </tr></thead>
                <tbody id="inventoryBody">
                    <tr><td colspan="7" class="text-center py-8 text-slate-400">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    `;

    let allProducts = [];

    function renderInventoryRows(filter) {
        const tbody = document.getElementById('inventoryBody');
        if (!tbody) return;
        let filtered = allProducts;
        if (filter === 'low')  filtered = allProducts.filter(p => p.stock > 0 && p.stock <= (p.lowStockAt||10));
        if (filter === 'out')  filtered = allProducts.filter(p => p.stock <= 0);
        if (filter === 'ok')   filtered = allProducts.filter(p => p.stock > (p.lowStockAt||10));

        tbody.innerHTML = filtered.length ? filtered.map(p => {
            const dt = p.updatedAt?.toDate ? new Date(p.updatedAt.toDate()).toLocaleString('en-KE') : '—';
            return `<tr>
                <td class="font-semibold text-slate-800">${p.name}</td>
                <td class="font-mono text-xs text-slate-400">${p.barcode||'—'}</td>
                <td class="text-slate-500 text-sm">${p.category||'—'}</td>
                <td>
                    <div class="flex items-center gap-2">
                        <span class="badge ${p.stock<=0?'badge-red':p.stock<=(p.lowStockAt||10)?'badge-amber':'badge-green'} mr-1">
                            ${p.stock<=0?'OUT':p.stock}
                        </span>
                        ${p.stock<=(p.lowStockAt||10)&&p.stock>0 ? '<span class="text-xs text-amber-600">⚠ Low</span>' : ''}
                    </div>
                </td>
                <td class="text-slate-400 text-sm">${p.lowStockAt||10}</td>
                <td class="text-slate-400 text-xs">${dt}</td>
                <td>
                    <button onclick="restockProduct('${p.id}','${p.name}',${p.stock})"
                            class="px-2.5 py-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-700
                                   rounded-lg text-xs font-semibold">Restock</button>
                </td>
            </tr>`;
        }).join('') : '<tr><td colspan="7" class="text-center py-10 text-slate-400">No products matching filter</td></tr>';
    }

    const unsub = db.collection('products')
        .where('storeId', '==', storeData.id)
        .orderBy('stock', 'asc')
        .onSnapshot({
            next: snap => {
            allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderInventoryRows(document.getElementById('stockFilter')?.value || 'all');
            },
            error: err => { console.error(err); showToast("Failed to sync inventory: " + err.message, "error"); }
        });
    listeners.push(unsub);

    document.getElementById('stockFilter').addEventListener('change', e =>
        renderInventoryRows(e.target.value));
}

//  STORES (super admin)

function renderStores() {
    document.getElementById('contentArea').innerHTML = `
        <div class="flex gap-3 mb-4">
            <input id="storeSearch" type="text" placeholder="Search stores by name or location…"
                   class="px-4 py-2.5 border border-slate-200 rounded-xl text-sm flex-1
                          focus:outline-none focus:border-blue-500"/>
        </div>
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr>
                    <th>Store Name</th><th>Location</th><th>Phone</th><th>Created</th><th>Actions</th>
                </tr></thead>
                <tbody id="storesBody">
                    <tr><td colspan="5" class="text-center py-8 text-slate-400">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    `;

    let allStores = [];
    const unsub = db.collection('stores').orderBy('name').onSnapshot(snap => {
        allStores = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderStoreRows(allStores);
    });
    listeners.push(unsub);

    document.getElementById('storeSearch').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        renderStoreRows(allStores.filter(s => 
            s.name.toLowerCase().includes(q) || 
            (s.location && s.location.toLowerCase().includes(q))
        ));
    });
}

function renderStoreRows(stores) {
    const tbody = document.getElementById('storesBody');
        if (!tbody) return;

    tbody.innerHTML = stores.length ? stores.map(s => {
        const dt = s.createdAt?.toDate ? new Date(s.createdAt.toDate()).toLocaleDateString('en-KE') : '—';
        return `<tr>
            <td class="font-semibold text-slate-800">${s.name}</td>
            <td class="text-slate-500">${s.location||'—'}</td>
            <td class="font-mono text-sm">${s.phone||'—'}</td>
            <td class="text-slate-400 text-xs">${dt}</td>
            <td class="whitespace-nowrap">
                <div class="flex gap-2">
                    <button onclick="switchStoreContext('${s.id}')"
                            class="px-2.5 py-1 bg-blue-600 text-white hover:bg-blue-700
                                   rounded-lg text-xs font-bold shadow-sm transition">Manage</button>
                    <button onclick="editStore('${s.id}')"
                            class="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600
                                   rounded-lg text-xs font-semibold transition">Edit</button>
                </div>
            </td>
        </tr>`;
    }).join('') : '<tr><td colspan="5" class="text-center py-10 text-slate-400">No stores found</td></tr>';
}

window.switchStoreContext = (id) => {
    const sel = document.getElementById('storeSelector');
    if (sel) {
        sel.value = id;
        sel.dispatchEvent(new Event('change'));
        navigateTo('dashboard');
    }
};

function storeFormHtml(s = {}) {
    return `
        <div class="space-y-4">
            <div>
                <label class="form-label">Store Name *</label>
                <input id="sf_name" class="form-input" value="${s.name||''}" placeholder="e.g. Mama Pima Supermarket"/>
            </div>
            <div>
                <label class="form-label">Store Code (Unique Prefix) *</label>
                <input id="sf_code" class="form-input" value="${s.storeCode||''}" placeholder="e.g. MP01"/>
            </div>
            <div>
                <label class="form-label">Location / Branch</label>
                <input id="sf_location" class="form-input" value="${s.location||''}" placeholder="e.g. Westlands, Nairobi"/>
            </div>
            <div>
                <label class="form-label">Phone Number</label>
                <input id="sf_phone" class="form-input" value="${s.phone||''}" placeholder="0700 000 000"/>
            </div>
            <div>
                <label class="form-label">VAT Number (KRA PIN)</label>
                <input id="sf_vat" class="form-input" value="${s.vatNumber||''}" placeholder="P000000000A"/>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="saveStore('${s.id||''}')" class="btn-primary flex-1">
                    ${s.id ? 'Save Changes' : 'Create Store'}
                </button>
                <button onclick="closeModal()" class="btn-ghost">Cancel</button>
            </div>
        </div>
    `;
}

window.editStore = async (id) => {
    const doc = await db.collection('stores').doc(id).get();
    openModal('Edit Store', storeFormHtml({ id, ...doc.data() }));
};

window.saveStore = async (id) => {
    const name     = document.getElementById('sf_name').value.trim();
    const storeCode = document.getElementById('sf_code').value.trim().toUpperCase();
    const location = document.getElementById('sf_location').value.trim();
    const phone    = document.getElementById('sf_phone').value.trim();
    const vatNum   = document.getElementById('sf_vat').value.trim();

    if (!name || !storeCode) { showToast('Store name and code are required', 'error'); return; }

    const data = { name, storeCode, location, phone, vatNumber: vatNum,
                   updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    try {
        if (id) {
            await db.collection('stores').doc(id).update(data);
            showToast('Store updated', 'success');
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            data.invoiceCounter = 0;
            await db.collection('stores').add(data);
            showToast('Store created', 'success');
        }
        closeModal();
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
    }
};

window.saveSettings = async () => {
    const data = {
        name:           document.getElementById('set_name').value.trim(),
        location:       document.getElementById('set_location').value.trim(),
        phone:          document.getElementById('set_phone').value.trim(),
        vatNumber:      document.getElementById('set_vat').value.trim(),
        receiptFooter:  document.getElementById('set_footer').value.trim(),

};

    document.getElementById('contentArea').innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Store Rules -->
            <div class="bg-white rounded-2xl border border-slate-200 p-6">

                    </div>
                    <button onclick="saveLoyaltySettings()" class="btn-primary">Save Rules</button>

            </div>

            <!-- Customer Management -->
            <div class="bg-white rounded-2xl border border-slate-200 p-6">
                <h3 class="font-bold text-slate-800 mb-4">Customer Points Manager</h3>
                <div class="flex gap-2 mb-6">
                    <input id="cust_search" type="text" placeholder="Search Email or Phone..." class="form-input flex-1"/>

                            <p class="text-[10px] uppercase font-bold text-slate-500">Current Balance</p>

                        <div class="flex gap-2">

async function saveLoyaltySettings() {
    const data = {
        loyaltyPointsPerKES: parseFloat(document.getElementById('l_earn').value),
        loyaltyKESPerPoint: parseFloat(document.getElementById('l_value').value),
        loyaltyMinPoints: parseInt(document.getElementById('l_min').value),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await db.collection('stores').doc(storeData.id).update(data);
    Object.assign(storeData, data);
    showToast('Loyalty rules updated', 'success');
}

let foundCustId = null;
async function searchLoyaltyCustomer() {
    const q = document.getElementById('cust_search').value.trim();
    if (!q) return;
    
    const snap = await db.collection('customers')
        .where('storeId', '==', storeData.id)
        .where('phone', '==', q).get();
        
    if (snap.empty) {
        showToast('Customer not found', 'warning');
        document.getElementById('cust_result').classList.add('hidden');
        return;
    }

    const doc = snap.docs[0];
    const data = doc.data();
    foundCustId = doc.id;
    const points = data.points !== undefined ? data.points : (data.loyaltyPoints || 0);
    
    document.getElementById('res_name').textContent = data.fullName || data.name || 'Anonymous';
    document.getElementById('res_id').textContent = doc.id;
    document.getElementById('res_points').textContent = points;
    document.getElementById('cust_result').classList.remove('hidden');
}

async function adjustPoints() {
    const val = parseInt(document.getElementById('adj_val').value);
    if (!val || !foundCustId) return;

    await db.collection('customers').doc(foundCustId).update({
        points: firebase.firestore.FieldValue.increment(val),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    showToast('Points adjusted', 'success');
    searchLoyaltyCustomer(); // refresh
    document.getElementById('adj_val').value = '';
}

async function renderLogs() {
    if (!storeData) return;
    document.getElementById('contentArea').innerHTML = `
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr>
                    <th class="w-1/4">Time</th>
                    <th class="w-1/4">User</th>
                    <th class="w-1/6">Action</th>
                    <th>Details</th>
                </tr></thead>
                <tbody id="logsBody">
                    <tr><td colspan="4" class="text-center py-8 text-slate-400">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    `;

    const unsub = db.collection('logs')
        .where('storeId', '==', storeData.id)
        .orderBy('timestamp', 'desc')
        .limit(100)
        .onSnapshot(snap => {
            const tbody = document.getElementById('logsBody');
            if (!tbody) return;
            if (snap.empty) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-12 text-slate-400">No activity logs found for this store.</td></tr>';
                return;
            }
            tbody.innerHTML = snap.docs.map(doc => {
                const l = doc.data();
                const dt = l.timestamp?.toDate?.() ? new Date(l.timestamp.toDate()).toLocaleString('en-KE') : '—';
                const actionColor = (l.action||'').includes('delete') || (l.action||'').includes('reject') ? 'badge-red' : 'badge-blue';
                return `<tr>
                    <td class="text-xs text-slate-500 font-mono">${dt}</td>
                    <td class="font-semibold text-slate-700">${l.user || 'System'}</td>
                    <td><span class="badge ${actionColor} text-[10px] font-bold uppercase">${(l.action||'').replace('_', ' ')}</span></td>
                    <td class="text-sm text-slate-600">${l.details || '—'}</td>
                </tr>`;
            }).join('');
        }, err => handleQueryError(err, "Activity Logs"));
    listeners.push(unsub);
}

window.viewRefundSale = async (invoiceNo) => {
    if (!invoiceNo) { showToast("Invoice number missing", "warning"); return; }
    
    try {
        const snap = await db.collection('sales')
            .where('storeId', '==', storeData.id)
            .where('invoiceNo', '==', invoiceNo)
            .limit(1)
            .get();

        if (snap.empty) {
            showToast("Original sale record not found in this store", "error");
            return;
        }

        const sale = snap.docs[0].data();
        const itemsHtml = sale.items.map(i => `
            <div class="flex justify-between py-2 border-b border-slate-100 last:border-0">
                <div>
                    <p class="font-semibold text-slate-800 text-sm">${i.productName}</p>
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tight">Qty: ${i.qty} &bull; ${fmt(i.unitPrice)} each</p>
                </div>
                <div class="text-right">
                    <p class="font-mono font-bold text-slate-700">${fmt(i.total)}</p>
                    ${(i.savings || 0) > 0 ? `<p class="text-[9px] text-blue-600 font-bold">SAVED ${fmt(i.savings)}</p>` : ''}
                </div>
            </div>
        `).join('');

        const html = `
            <div class="space-y-5">
                <div class="flex justify-between items-start bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Invoice Number</p>
                        <p class="text-lg font-mono font-bold text-blue-600">${sale.invoiceNo}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Method</p>
                        <span class="badge ${sale.paymentMethod==='mpesa'?'badge-green':sale.paymentMethod==='card'?'badge-blue':'badge-amber'}">
                            ${sale.paymentMethod?.toUpperCase()}
                        </span>
                    </div>
                </div>

                <div class="max-h-60 overflow-y-auto px-1">
                    ${itemsHtml}
                </div>

                <div class="bg-slate-900 p-5 rounded-2xl text-white shadow-lg">
                    <div class="space-y-2 text-sm opacity-80">
                        <div class="flex justify-between">
                            <span>Subtotal (Excl. Tax)</span>
                            <span class="font-mono">${fmt(sale.subtotalExclTax || (sale.grandTotal / 1.16))}</span>
                        </div>
                        ${(sale.totalSavings || 0) > 0 ? `
                        <div class="flex justify-between text-blue-300 font-bold">
                            <span>Promotion Savings</span>
                            <span class="font-mono">-${fmt(sale.totalSavings)}</span>
                        </div>` : ''}
                        ${(sale.discountAmount || 0) > 0 ? `
                        <div class="flex justify-between text-emerald-400 font-bold">
                            <span>Loyalty Discount</span>
                            <span class="font-mono">-${fmt(sale.discountAmount)}</span>
                        </div>` : ''}
                        <div class="flex justify-between border-b border-white/10 pb-2">
                            <span>VAT (16%)</span>
                            <span class="font-mono">${fmt(sale.vatTotal)}</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center pt-3 mt-1">
                        <span class="text-base font-bold uppercase tracking-wider">Total Amount</span>
                        <span class="text-2xl font-mono font-black text-emerald-400">${fmt(sale.grandTotal)}</span>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full btn-ghost mt-2">Close View</button>
            </div>
        `;

        openModal(`Transaction Audit`, html);
    } catch (err) {
        console.error(err);
        showToast("Error retrieving sale details: " + err.message, "error");
    }
};

window.confirmDeleteUser = async (id) => {
    try {
        await db.collection('users').doc(id).delete();
        showToast('User removed successfully', 'success');
        closeModal();
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
    }
};

window.toggleUserStatus = async (id, currentActive) => {
    if (id === currentUser.uid) {
        showToast("You cannot deactivate your own account.", "warning");
        return;
    }
    try {
        await db.collection('users').doc(id).update({
            active: !currentActive,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast(`User ${!currentActive ? 'activated' : 'deactivated'}`, 'success');
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
    }
};

window.deleteUser = (id, name) => {
    if (id === currentUser.uid) {
        showToast("You cannot delete your own account.", "warning");
        return;
    }
    openModal('Delete User', `
        <p class="text-slate-600 mb-5">Are you sure you want to permanently remove <strong>${name}</strong>? This action cannot be undone.</p>
        <div class="flex gap-3">
            <button onclick="confirmDeleteUser('${id}')" class="btn-danger flex-1">Delete Permanently</button>
            <button onclick="closeModal()" class="btn-ghost">Cancel</button>
        </div>
    `);
};

window.confirmDeleteUser = async (id) => {
    try {
        await db.collection('users').doc(id).delete();
        showToast('User removed successfully', 'success');
        closeModal();
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
    }
};

window.navigateTo = navigateTo;
window.closeModal = closeModal;
